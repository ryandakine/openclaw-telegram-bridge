<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Telegram Bridge - Product Requirements Document - Project Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            color: #58a6ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #58a6ff;
        }
        
        .stat-card .label {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 8px;
        }
        
        .stat-card.done .value { color: #3fb950; }
        .stat-card.pending .value { color: #d29922; }
        .stat-card.total .value { color: #58a6ff; }
        .stat-card.progress .value { color: #a371f7; }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .section-header {
            background: #21262d;
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .section-header h2 {
            font-size: 16px;
            color: #f0f6fc;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-body {
            padding: 20px;
        }
        
        .progress-bar {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #3fb950);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .task-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.2s;
        }
        
        .task-item:hover {
            border-color: #58a6ff;
            background: #161b22;
        }
        
        .task-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }
        
        .task-status.done { background: #3fb950; box-shadow: 0 0 8px #3fb95040; }
        .task-status.in-progress { background: #d29922; box-shadow: 0 0 8px #d2992240; animation: pulse 2s infinite; }
        .task-status.pending { background: #8b949e; }
        .task-status.blocked { background: #f85149; box-shadow: 0 0 8px #f8514940; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 4px;
        }
        
        .task-desc {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        
        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        
        .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .priority-high { color: #f85149; }
        .priority-medium { color: #d29922; }
        .priority-low { color: #8b949e; }
        
        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-done {
            background: #23863633;
            color: #3fb950;
            border: 1px solid #238636;
        }
        
        .badge-in-progress {
            background: #9e6a0344;
            color: #d29922;
            border: 1px solid #9e6a03;
        }
        
        .badge-pending {
            background: #8b949e22;
            color: #8b949e;
            border: 1px solid #8b949e;
        }
        
        .badge-blocked {
            background: #da363333;
            color: #f85149;
            border: 1px solid #da3633;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #30363d;
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0d1117;
            border: 2px solid #30363d;
        }
        
        .timeline-item.done::before {
            background: #3fb950;
            border-color: #3fb950;
        }
        
        .timeline-item.in-progress::before {
            background: #d29922;
            border-color: #d29922;
            animation: pulse 2s infinite;
        }
        
        .timeline-item.blocked::before {
            background: #f85149;
            border-color: #f85149;
        }
        
        .timeline-date {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        
        .timeline-content {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
        }
        
        .subtasks {
            margin-top: 12px;
            padding-left: 20px;
            border-left: 2px solid #30363d;
        }
        
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            color: #8b949e;
        }
        
        .subtask-item.done {
            color: #3fb950;
            text-decoration: line-through;
        }
        
        .subtask-item.in-progress {
            color: #d29922;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #238636;
            border-color: #238636;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        
        .error {
            background: #da363333;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .task-details {
            margin-top: 12px;
            padding: 12px;
            background: #161b22;
            border-radius: 6px;
            font-size: 13px;
            color: #8b949e;
        }

        .task-details strong {
            color: #c9d1d9;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card .value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 OpenClaw Telegram Bridge - Product Requirements Document</h1>
        <div class="subtitle">Project Progress & Task Tracker</div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="label">Total Tasks</div>
                <div class="value" id="totalTasks">-</div>
            </div>
            <div class="stat-card done">
                <div class="label">Completed</div>
                <div class="value" id="completedTasks">-</div>
            </div>
            <div class="stat-card pending">
                <div class="label">In Progress</div>
                <div class="value" id="inProgressTasks">-</div>
            </div>
            <div class="stat-card progress">
                <div class="label">Progress</div>
                <div class="value" id="progressPercent">-</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2>📈 Overall Progress</h2>
            </div>
            <div class="section-body">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>Project Completion</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2>📋 Tasks</h2>
                <div class="filters">
                    <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                    <button class="filter-btn" onclick="filterTasks('done')">Done</button>
                    <button class="filter-btn" onclick="filterTasks('in-progress')">In Progress</button>
                    <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterTasks('blocked')">Blocked</button>
                </div>
            </div>
            <div class="section-body">
                <div class="task-list" id="taskList">
                    <div class="loading">Loading tasks...</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2>📅 Timeline</h2>
            </div>
            <div class="section-body">
                <div class="timeline" id="timeline">
                    <div class="loading">Loading timeline...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allTasks = [];
        let currentFilter = 'all';
        
        async function loadTasks() {
            try {
                const response = await fetch('.taskmaster/tasks/tasks.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                const tasks = data.master?.tasks || [];
                allTasks = tasks;
                
                updateStats(tasks);
                renderTasks(tasks);
                renderTimeline(tasks);
            } catch (error) {
                console.error('Failed to load tasks:', error);
                document.getElementById('taskList').innerHTML = `
                    <div class="error">
                        <strong>Failed to load tasks</strong><br>
                        ${error.message}<br><br>
                        Make sure you're running this dashboard from the project root directory.
                    </div>
                `;
            }
        }
        
        function updateStats(tasks) {
            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            const inProgress = tasks.filter(t => t.status === 'in-progress').length;
            const pending = tasks.filter(t => t.status === 'pending').length;
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = done;
            document.getElementById('inProgressTasks').textContent = inProgress;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        function renderTasks(tasks) {
            const filtered = currentFilter === 'all' 
                ? tasks 
                : tasks.filter(t => t.status === currentFilter);
            
            if (filtered.length === 0) {
                document.getElementById('taskList').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No tasks found</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('taskList').innerHTML = filtered.map(task => {
                const subtasks = task.subtasks || [];
                const completedSubtasks = subtasks.filter(s => s.status === 'done').length;
                const subtaskSummary = subtasks.length > 0 
                    ? `<span>📋 ${completedSubtasks}/${subtasks.length} subtasks</span>` 
                    : '';
                
                const dependencies = task.dependencies?.length > 0
                    ? `<span>🔗 Depends: ${task.dependencies.join(', ')}</span>`
                    : '';
                
                return `
                    <div class="task-item">
                        <div class="task-status ${task.status}"></div>
                        <div class="task-content">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            <div class="task-desc">${escapeHtml(task.description || '')}</div>
                            <div class="task-meta">
                                <span class="priority-${task.priority || 'low'}">● ${(task.priority || 'low').toUpperCase()}</span>
                                <span>🆔 ${task.id}</span>
                                ${subtaskSummary}
                                ${dependencies}
                                <span class="badge badge-${task.status}">${task.status}</span>
                            </div>
                            ${task.details ? `<div class="task-details"><strong>Details:</strong> ${escapeHtml(task.details)}</div>` : ''}
                            ${subtasks.length > 0 ? renderSubtasks(subtasks) : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderSubtasks(subtasks) {
            return `
                <div class="subtasks">
                    ${subtasks.map(st => `
                        <div class="subtask-item ${st.status}">
                            <span>${st.status === 'done' ? '✓' : st.status === 'in-progress' ? '◐' : '○'}</span>
                            ${escapeHtml(st.title)}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderTimeline(tasks) {
            const sorted = [...tasks].sort((a, b) => {
                const dateA = a.updatedAt ? new Date(a.updatedAt) : new Date(0);
                const dateB = b.updatedAt ? new Date(b.updatedAt) : new Date(0);
                return dateB - dateA;
            });
            
            document.getElementById('timeline').innerHTML = sorted.map(task => {
                const date = task.updatedAt 
                    ? new Date(task.updatedAt).toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })
                    : 'No date';
                
                return `
                    <div class="timeline-item ${task.status}">
                        <div class="timeline-date">${date}</div>
                        <div class="timeline-content">
                            <strong>${escapeHtml(task.title)}</strong>
                            <div style="font-size: 13px; color: #8b949e; margin-top: 4px;">
                                ${escapeHtml(task.description || '').substring(0, 100)}${(task.description || '').length > 100 ? '...' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTasks(allTasks);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load tasks on page load
        loadTasks();
        
        // Refresh every 30 seconds
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
